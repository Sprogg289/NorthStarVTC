<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home - NorthStar Logistics</title>

<style>
/* Reset */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background-color: #0d1117;
    color: white;
    overflow-x: hidden;
}

/* SPLASH SCREEN */
#splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: #0d1117;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    transition: opacity 0.5s ease;
}

#splash img {
    width: 150px;
    height: 150px;
    object-fit: contain;
    margin-bottom: 20px;
}

#splash h2 {
    font-size: 2rem;
    font-weight: bold;
    text-align: center;
    color: white;
}

/* HEADER */
header {
    width: 100%;
    background-color: #0d1117;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    top: 0;
    z-index: 999;
}

header .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
}

header img {
    width: 50px;
    height: 50px;
    object-fit: contain;
}

header h1 {
    font-size: 20px;
    font-weight: bold;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 30px;
    font-weight: 600;
    font-size: 15px;
}

nav a:hover { color: #2c3e50; }

/* HERO */
.hero {
    width: 100%;
    height: 100vh;
    background-image: url('/images/NSL_CLEAR.png');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 20px;
}

.hero-title {
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 10px;
    text-shadow: 0px 0px 10px black;
}

.hero-sub {
    font-size: 1.3rem;
    margin-bottom: 30px;
    text-shadow: 0px 0px 10px black;
}

/* BUTTONS */
.btn-area { display: flex; gap: 20px; margin-bottom: 50px; }

.btn1 {
    background-color: #2c3e50;
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: bold;
    text-decoration: none;
}

.btn2 {
    background-color: transparent;
    border: 2px solid white;
    padding: 12px 25px;
    border-radius: 30px;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.btn2:hover { 
    border-color: #2c3e50; 
    color: #2c3e50; 
}

/* DOWN ARROW */
.down-arrow {
    font-size: 30px;
    margin-top: 20px;
    animation: bounce 1.4s infinite;
}

@keyframes bounce {
    0% { transform: translateY(0px); }
    50% { transform: translateY(8px); }
    100% { transform: translateY(0px); }
}

/* CONTENT AREA */
.content {
    max-width: 1200px;
    margin: 80px auto;
    padding: 20px;
    color: white;
}

footer {
    background-color: #0d1117;
    text-align: center;
    padding: 20px 0;
    margin-top: 40px;
    font-size: 14px;
    color: #888;
}
</style>
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
    <img src="images/NSL_CLEAR_NO_TEXT.png" alt="NorthStar Logo">
    <h2>Welcome to NorthStar Logistics</h2>
</div>

<!-- HEADER -->
<header>
    <div class="logo-area">
        <img src="images/NSL_CLEAR_NO_TEXT.png" alt="NorthStar Logo">
        <h1>NorthStar Logistics</h1>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="./pages/aboutpageindex.html">About</a>
        <a href="./pages/Companyinfomation.index.html">Company Info</a>
        <a href="./pages/NorthStarPartnershipindex.html">NorthStar Partnership</a>
    </nav>
</header>

<!-- HERO SECTION -->
<section class="hero" id="home">
    <h1 class="hero-title">NorthStar Logistics</h1>
    <p class="hero-sub">Logistics Done the NorthStar Way</p>

    <div class="btn-area">
        <a href="https://discord.gg/2GNHKbJeDM" class="btn1" target="_blank" rel="noopener noreferrer">Join our Discord</a>
        <a href="#" class="btn1" target="_blank" rel="noopener noreferrer">Our truckersMP</a>
        <a href="https://hub.truckyapp.com/company/39513" class="btn1" target="_blank" rel="noopener noreferrer">Our trucky</a>
    </div>
</section>

<footer>
    <p>© 2025 NorthStar Logistics. All Rights Reserved.</p>
</footer>

<script>
// Only show splash once per session and if in a new tab
window.addEventListener('load', () => {
    const splash = document.getElementById('splash');
    const isNewTab = !window.opener; // Checks if the page is not opened via another window/tab
    const splashShown = sessionStorage.getItem('splashShown');

    if (!splashShown && isNewTab) {
        // Show splash for 3 seconds
        setTimeout(() => {
            splash.style.opacity = '0';
            splash.style.pointerEvents = 'none';
            setTimeout(() => splash.style.display = 'none', 500);
            sessionStorage.setItem('splashShown', 'true'); // mark splash as shown
        }, 3000);
    } else {
        // Immediately hide splash if already shown or not a new tab
        splash.style.display = 'none';
    }
});
</script>

</body>
</html>
